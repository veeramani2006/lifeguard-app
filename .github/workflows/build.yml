name: Build LifeGuard APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Android project structure
        run: |
          set -e
          mkdir -p app/src/main/java/com/lifeguard/emergency
          mkdir -p app/src/main/assets/public
          mkdir -p app/src/main/res/{layout,values,drawable,xml}
          mkdir -p gradle/wrapper

          cat > settings.gradle << 'EOF'
          rootProject.name = "LifeGuard"
          include ':app'
          EOF

          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.lifeguard.emergency'
              compileSdk 34
              defaultConfig {
                  applicationId "com.lifeguard.emergency"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes { debug { debuggable true } }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.webkit:webkit:1.10.0'
          }
          EOF

          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>
              <uses-permission android:name="android.permission.VIBRATE"/>
              <application android:allowBackup="true" android:label="LifeGuard"
                  android:theme="@style/AppTheme" android:usesCleartextTraffic="true"
                  android:hardwareAccelerated="true">
                  <activity android:name=".MainActivity" android:exported="true"
                      android:screenOrientation="portrait"
                      android:configChanges="orientation|keyboardHidden|screenSize"
                      android:windowSoftInputMode="adjustResize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat > app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.NoActionBar">
                  <item name="android:windowBackground">#080c14</item>
                  <item name="android:statusBarColor">#080c14</item>
                  <item name="android:navigationBarColor">#080c14</item>
                  <item name="android:windowFullscreen">false</item>
              </style>
          </resources>
          EOF

          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources><string name="app_name">LifeGuard</string></resources>
          EOF

          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:background="#080c14">
              <WebView android:id="@+id/webview"
                  android:layout_width="match_parent" android:layout_height="match_parent"
                  android:background="#080c14"/>
          </RelativeLayout>
          EOF

          cat > app/src/main/java/com/lifeguard/emergency/MainActivity.java << 'EOF'
          package com.lifeguard.emergency;
          import android.Manifest; import android.content.Intent; import android.content.pm.PackageManager;
          import android.graphics.Color; import android.net.Uri; import android.os.Build; import android.os.Bundle;
          import android.view.View; import android.view.Window; import android.view.WindowManager;
          import android.webkit.*; import androidx.appcompat.app.AppCompatActivity;
          import androidx.core.app.ActivityCompat;
          public class MainActivity extends AppCompatActivity {
              private WebView webView;
              @Override protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  requestWindowFeature(Window.FEATURE_NO_TITLE);
                  getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN, WindowManager.LayoutParams.FLAG_FULLSCREEN);
                  if (Build.VERSION.SDK_INT >= 21) {
                      getWindow().setStatusBarColor(Color.parseColor("#080c14"));
                      getWindow().setNavigationBarColor(Color.parseColor("#080c14"));
                  }
                  setContentView(R.layout.activity_main);
                  webView = findViewById(R.id.webview);
                  WebSettings s = webView.getSettings();
                  s.setJavaScriptEnabled(true);
                  s.setDomStorageEnabled(true);
                  s.setDatabaseEnabled(true);
                  s.setAllowFileAccess(true);
                  s.setAllowContentAccess(true);
                  s.setAllowFileAccessFromFileURLs(true);
                  s.setAllowUniversalAccessFromFileURLs(true);
                  s.setGeolocationEnabled(true);
                  s.setMediaPlaybackRequiresUserGesture(false);
                  s.setSupportZoom(false);
                  s.setBuiltInZoomControls(false);
                  s.setDisplayZoomControls(false);
                  s.setCacheMode(WebSettings.LOAD_DEFAULT);
                  s.setLoadWithOverviewMode(true);
                  s.setUseWideViewPort(true);
                  if (Build.VERSION.SDK_INT >= 21) {
                      s.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);
                  }
                  webView.setLayerType(View.LAYER_TYPE_HARDWARE, null);
                  webView.setWebViewClient(new WebViewClient() {
                      @Override
                      public boolean shouldOverrideUrlLoading(WebView v, WebResourceRequest r) {
                          String url = r.getUrl().toString();
                          if (url.startsWith("tel:")) {
                              startActivity(new Intent(Intent.ACTION_DIAL, Uri.parse(url)));
                              return true;
                          }
                          return false;
                      }
                      @Override
                      public void onPageFinished(WebView view, String url) {
                          super.onPageFinished(view, url);
                          view.setBackgroundColor(Color.parseColor("#080c14"));
                      }
                  });
                  webView.setWebChromeClient(new WebChromeClient() {
                      @Override
                      public void onGeolocationPermissionsShowPrompt(String o, GeolocationPermissions.Callback cb) {
                          cb.invoke(o, true, false);
                      }
                      @Override
                      public void onPermissionRequest(PermissionRequest r) {
                          if (Build.VERSION.SDK_INT >= 21) r.grant(r.getResources());
                      }
                  });
                  webView.setBackgroundColor(Color.parseColor("#080c14"));
                  ActivityCompat.requestPermissions(this,
                      new String[]{Manifest.permission.ACCESS_FINE_LOCATION, Manifest.permission.VIBRATE}, 100);
                  webView.loadUrl("file:///android_asset/public/index.html");
              }
              @Override public void onBackPressed() {
                  if (webView != null && webView.canGoBack()) webView.goBack();
                  else super.onBackPressed();
              }
              @Override protected void onResume() { super.onResume(); if (webView != null) webView.onResume(); }
              @Override protected void onPause() { super.onPause(); if (webView != null) webView.onPause(); }
              @Override protected void onDestroy() { if (webView != null) { webView.destroy(); webView = null; } super.onDestroy(); }
          }
          EOF

      - name: Download JS libraries and inject HTML
        run: |
          set -e
          # Download Tailwind CSS (standalone)
          echo "Downloading Tailwind..."
          curl -sL "https://cdn.tailwindcss.com" -o app/src/main/assets/public/tailwind.js
          echo "Tailwind size: "

          # Download Lucide icons
          echo "Downloading Lucide..."
          curl -sL "https://unpkg.com/lucide@latest/dist/umd/lucide.js" -o app/src/main/assets/public/lucide.js
          echo "Lucide size: "

          # Decode and write LifeGuard HTML
          python3 -c "
          import base64
          b64 = ''
          html = base64.b64decode(b64).decode('utf-8')
          with open('app/src/main/assets/public/index.html', 'w', encoding='utf-8') as f:
              f.write(html)
          print(f'HTML written: {len(html)} chars')
          "
          echo "Assets ready:"
          ls -lh app/src/main/assets/public/

      - name: Setup Gradle wrapper
        run: |
          curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar"             -o gradle/wrapper/gradle-wrapper.jar
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradlew" -o gradlew
          chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LifeGuard-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
